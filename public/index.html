<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Chat</title>
  <!-- Japanese-friendly web font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- Markdown rendering: marked + DOMPurify (CDN). Falls back to plain text when offline. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    :root { --bg:#1e1e1e; --panel:#252526; --border:#333; --user:#2b5278; --tool:#3a3a2a; --accent:#d97757; }
    * { box-sizing: border-box; }
    body { margin:0; height:100vh; display:flex; flex-direction:column;
           font-family:"Noto Sans JP",-apple-system,"Segoe UI",sans-serif; background:var(--bg); color:#eee; }
    header { padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--border);
             display:flex; align-items:center; gap:12px; }
    header h1 { font-size:15px; margin:0; font-weight:600; }
    header .meta { font-size:12px; color:#999; }
    header .spacer { margin-left:auto; }
    header button { background:var(--border); color:#eee; border:none;
                    padding:6px 12px; border-radius:6px; cursor:pointer; font-family:inherit; }
    header button:hover { background:#444; }
    .layout { flex:1; display:flex; min-height:0; }
    /* Session history sidebar */
    #sidebar { width:240px; background:var(--panel); border-right:1px solid var(--border);
               overflow-y:auto; flex-shrink:0; display:flex; flex-direction:column; }
    #sidebar .head { padding:10px 14px; font-size:12px; color:#999; text-transform:uppercase;
                     letter-spacing:.05em; border-bottom:1px solid var(--border); }
    .sess { padding:10px 14px; border-bottom:1px solid #2a2a2a; cursor:pointer; font-size:13px; }
    .sess:hover { background:#2e2e2e; }
    .sess.active { background:#33312e; border-left:3px solid var(--accent); }
    .sess .title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sess .time { font-size:11px; color:#888; margin-top:2px; }
    .main { flex:1; display:flex; flex-direction:column; min-width:0; }
    #presets { padding:8px 16px; display:flex; gap:8px; flex-wrap:wrap;
               background:var(--panel); border-bottom:1px solid var(--border); }
    #presets button { background:#333; color:#ddd; border:1px solid #444; border-radius:14px;
                      padding:4px 12px; font-size:12px; cursor:pointer; font-family:inherit; }
    #presets button:hover { background:#444; }
    #log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:80%; padding:10px 14px; border-radius:10px;
           word-break:break-word; line-height:1.5; font-size:14px; }
    .msg.user { align-self:flex-end; background:var(--user); white-space:pre-wrap; }
    .msg.assistant { align-self:flex-start; background:var(--panel); border:1px solid var(--border); }
    .msg.tool { align-self:flex-start; background:var(--tool); font-family:ui-monospace,monospace;
                font-size:12px; color:#cc9; white-space:pre-wrap; }
    .msg.error { align-self:flex-start; background:#5a2b2b; white-space:pre-wrap; }
    .msg.result { align-self:center; background:transparent; color:#888; font-size:12px; }
    /* Assistant message wrapper + action toolbar (copy / download) */
    .assistant-wrap { align-self:flex-start; max-width:80%; display:flex; flex-direction:column; gap:4px; }
    .assistant-wrap .msg.assistant { max-width:100%; }
    .msg-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; padding-left:2px; }
    .assistant-wrap:hover .msg-actions { opacity:1; }
    .icon-btn { background:transparent; border:1px solid var(--border); border-radius:6px;
                color:#aaa; width:28px; height:28px; display:inline-flex; align-items:center;
                justify-content:center; cursor:pointer; padding:0; }
    .icon-btn:hover { background:#333; color:#eee; }
    .icon-btn svg { width:15px; height:15px; }
    .icon-btn.copied { color:#4caf50; border-color:#4caf50; }
    /* Approval card */
    .perm { align-self:flex-start; max-width:80%; background:#2d2a3a; border:1px solid #4a4470;
            border-radius:10px; padding:12px 14px; font-size:13px; }
    .perm .title { font-weight:600; margin-bottom:6px; }
    .perm pre { background:#1a1a1a; border-radius:6px; padding:8px; overflow-x:auto;
                font-size:12px; margin:6px 0; }
    .perm .btns { display:flex; gap:8px; margin-top:8px; }
    .perm button { border:none; border-radius:6px; padding:6px 16px; font-weight:600; cursor:pointer; font-family:inherit; }
    .perm .approve { background:#2e7d32; color:#fff; }
    .perm .reject { background:#b23b3b; color:#fff; }
    .perm.resolved { opacity:.6; }
    .perm.resolved .btns { display:none; }
    /* Markdown elements */
    .msg.assistant pre { background:#1a1a1a; border:1px solid var(--border); border-radius:6px;
                         padding:10px; overflow-x:auto; }
    .msg.assistant code { background:#1a1a1a; padding:1px 5px; border-radius:4px;
                          font-family:ui-monospace,monospace; font-size:.9em; }
    .msg.assistant pre code { background:none; padding:0; }
    .msg.assistant table { border-collapse:collapse; }
    .msg.assistant th, .msg.assistant td { border:1px solid var(--border); padding:4px 8px; }
    .msg.assistant blockquote { border-left:3px solid var(--accent); margin:6px 0; padding-left:10px; color:#bbb; }
    .msg.assistant h1,.msg.assistant h2,.msg.assistant h3 { margin:.4em 0; }
    .msg.assistant p { margin:.4em 0; }
    .msg.assistant a { color:#6cb6ff; }
    form { display:flex; gap:8px; padding:12px 16px; background:var(--panel); border-top:1px solid var(--border); }
    #input { flex:1; resize:none; background:#1a1a1a; color:#eee; border:1px solid var(--border);
             border-radius:8px; padding:10px; font-size:14px; font-family:inherit; }
    #send { background:var(--accent); color:#fff; border:none; border-radius:8px;
            padding:0 20px; font-weight:600; cursor:pointer; font-family:inherit; }
    #send:disabled { opacity:.5; cursor:default; }
    /* Settings modal */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
                      align-items:center; justify-content:center; z-index:10; }
    .modal-backdrop.open { display:flex; }
    .modal { background:var(--panel); border:1px solid var(--border); border-radius:12px;
             padding:24px; width:420px; max-width:90vw; }
    .modal h2 { margin:0 0 16px; font-size:16px; }
    .modal label { display:block; font-size:13px; margin:12px 0 6px; color:#ccc; }
    .modal input { width:100%; background:#1a1a1a; color:#eee; border:1px solid var(--border);
                   border-radius:8px; padding:9px; font-size:14px; font-family:inherit; }
    .modal .hint { font-size:11px; color:#888; margin-top:4px; }
    .modal .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
    .modal .actions button { border:none; border-radius:8px; padding:8px 16px; font-weight:600;
                             cursor:pointer; font-family:inherit; }
    .modal .save { background:var(--accent); color:#fff; }
    .modal .cancel { background:var(--border); color:#eee; }
    .modal .saved { color:#4caf50; font-size:13px; align-self:center; margin-right:auto; }
  </style>
</head>
<body>
  <header>
    <h1>Claude Code Chat</h1>
    <span class="meta" id="meta"></span>
    <span class="spacer"></span>
    <button id="settingsBtn" title="Settings">⚙ 設定</button>
    <button id="newBtn">＋ 新しいセッション</button>
    <button id="logoutBtn">ログアウト</button>
  </header>
  <div class="layout">
    <aside id="sidebar">
      <div class="head">セッション履歴 / History</div>
      <div id="sessList"></div>
    </aside>
    <div class="main">
      <div id="presets"></div>
      <div id="log"></div>
      <form id="form">
        <textarea id="input" rows="3" placeholder="プロンプトを入力（Shift+Enterで送信 / Enterで改行）"></textarea>
        <button id="send" type="submit">送信</button>
      </form>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-backdrop" id="settingsModal">
    <div class="modal">
      <h2>設定 / Settings</h2>
      <label for="setModel">言語モデル / Model</label>
      <input id="setModel" placeholder="opus / sonnet / haiku / claude-opus-4-8 ..." />
      <div class="hint">空欄で既定のモデルを使用します。</div>

      <label for="setKeyId">AWS アクセスキー ID / Access Key ID</label>
      <input id="setKeyId" autocomplete="off" />

      <label for="setSecret">AWS シークレットアクセスキー / Secret Access Key</label>
      <input id="setSecret" type="password" autocomplete="off" placeholder="（変更する場合のみ入力）" />
      <div class="hint" id="secretHint"></div>

      <label for="setRegion">デフォルトリージョン / Default Region</label>
      <input id="setRegion" placeholder="ap-northeast-1" />

      <div class="actions">
        <span class="saved" id="savedMsg"></span>
        <button class="cancel" id="settingsCancel" type="button">キャンセル</button>
        <button class="save" id="settingsSave" type="button">保存</button>
      </div>
    </div>
  </div>

  <script>
    const logEl = document.getElementById("log");
    const inputEl = document.getElementById("input");
    const sendEl = document.getElementById("send");
    const metaEl = document.getElementById("meta");
    const presetsEl = document.getElementById("presets");
    const sessListEl = document.getElementById("sessList");
    let sessionId = null;
    let evtSource = null;

    const hasMarked = typeof window.marked !== "undefined" && typeof window.DOMPurify !== "undefined";

    // Inline SVG icons for the message action buttons.
    const ICON_COPY = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
    const ICON_CHECK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
    const ICON_DOWNLOAD = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`;

    function renderMarkdown(el, text) {
      if (hasMarked) {
        el.innerHTML = DOMPurify.sanitize(marked.parse(text, { breaks: true }));
      } else {
        el.textContent = text; // Plain text if the CDN can't be loaded.
      }
    }

    function addMsg(cls, text) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      return div;
    }

    // Copy the given text to the clipboard, with a fallback for non-secure contexts.
    async function copyToClipboard(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch { /* fall through to the legacy path */ }
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      } catch {
        return false;
      }
    }

    // Trigger a download of the given text as a Markdown file.
    function downloadText(text) {
      const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
      a.href = url;
      a.download = `claude-response-${stamp}.md`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Create an assistant message wrapped with copy / download action buttons.
    // getText() returns the current raw text so the buttons always copy the latest content.
    function addAssistantMsg(getText) {
      const wrap = document.createElement("div");
      wrap.className = "assistant-wrap";

      const msg = document.createElement("div");
      msg.className = "msg assistant";
      wrap.appendChild(msg);

      const actions = document.createElement("div");
      actions.className = "msg-actions";

      const copyBtn = document.createElement("button");
      copyBtn.className = "icon-btn";
      copyBtn.title = "Copy to clipboard";
      copyBtn.innerHTML = ICON_COPY;
      copyBtn.onclick = async () => {
        const ok = await copyToClipboard(getText());
        if (ok) {
          copyBtn.classList.add("copied");
          copyBtn.innerHTML = ICON_CHECK;
          setTimeout(() => {
            copyBtn.classList.remove("copied");
            copyBtn.innerHTML = ICON_COPY;
          }, 1500);
        }
      };

      const downloadBtn = document.createElement("button");
      downloadBtn.className = "icon-btn";
      downloadBtn.title = "Download as file";
      downloadBtn.innerHTML = ICON_DOWNLOAD;
      downloadBtn.onclick = () => downloadText(getText());

      actions.appendChild(copyBtn);
      actions.appendChild(downloadBtn);
      wrap.appendChild(actions);

      logEl.appendChild(wrap);
      logEl.scrollTop = logEl.scrollHeight;
      return msg;
    }

    // Render one persisted transcript item (used when restoring a session).
    function renderItem(item) {
      if (item.kind === "user") {
        addMsg("user", item.text);
      } else if (item.kind === "assistant") {
        const el = addAssistantMsg(() => item.text);
        renderMarkdown(el, item.text);
      } else if (item.kind === "tool") {
        addMsg("tool", "🔧 " + item.name + "  " + JSON.stringify(item.input));
      } else if (item.kind === "tool_result") {
        addMsg("error", "↩ Tool result: " + item.text);
      } else if (item.kind === "error") {
        addMsg("error", "⚠ " + item.message);
      } else if (item.kind === "result") {
        const cost = item.costUsd ? `  $${item.costUsd.toFixed(4)}` : "";
        addMsg("result", `Done (${item.durationMs}ms${cost})`);
      }
    }

    // Show an approval card and wait for Approve/Reject.
    function addPermissionCard(ev) {
      const card = document.createElement("div");
      card.className = "perm";
      const input = JSON.stringify(ev.toolInput, null, 2);
      card.innerHTML = `
        <div class="title">🔐 ツール実行の承認 / Approve tool: <b></b></div>
        <pre></pre>
        <div class="btns">
          <button class="approve">承認 / Approve</button>
          <button class="reject">拒否 / Reject</button>
        </div>`;
      card.querySelector("b").textContent = ev.toolName;
      card.querySelector("pre").textContent = input;

      const respond = async (decision) => {
        card.classList.add("resolved");
        card.querySelector(".title").innerHTML =
          (decision === "allow" ? "✅ 承認済み / Approved: " : "⛔ 拒否 / Rejected: ") + "<b></b>";
        card.querySelector("b").textContent = ev.toolName;
        await fetch("/api/permission/respond", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, requestId: ev.requestId, decision }),
        });
      };
      card.querySelector(".approve").onclick = () => respond("allow");
      card.querySelector(".reject").onclick = () => respond("deny");

      logEl.appendChild(card);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function openEvents() {
      if (evtSource) evtSource.close();
      evtSource = new EventSource("/api/events/" + sessionId);
      evtSource.onmessage = (e) => {
        const ev = JSON.parse(e.data);
        if (ev.kind === "permission") addPermissionCard(ev);
      };
    }

    async function newSession() {
      const r = await fetch("/api/session", { method: "POST" });
      const { sessionId: id } = await r.json();
      sessionId = id;
      logEl.innerHTML = "";
      metaEl.textContent = "session: " + id.slice(0, 8);
      openEvents();
      markActiveSession();
    }

    // ---- Session history ----
    async function loadSessions() {
      const { sessions } = await (await fetch("/api/sessions")).json();
      sessListEl.innerHTML = "";
      for (const s of sessions) {
        const div = document.createElement("div");
        div.className = "sess" + (s.id === sessionId ? " active" : "");
        div.dataset.id = s.id;
        const t = document.createElement("div");
        t.className = "title";
        t.textContent = s.title;
        const time = document.createElement("div");
        time.className = "time";
        time.textContent = new Date(s.updatedAt).toLocaleString();
        div.appendChild(t);
        div.appendChild(time);
        div.onclick = () => restoreSession(s.id);
        sessListEl.appendChild(div);
      }
    }

    function markActiveSession() {
      for (const el of sessListEl.children) {
        el.classList.toggle("active", el.dataset.id === sessionId);
      }
    }

    async function restoreSession(id) {
      const data = await (await fetch("/api/sessions/" + id)).json();
      sessionId = id;
      logEl.innerHTML = "";
      metaEl.textContent = "session: " + id.slice(0, 8);
      for (const item of data.messages) renderItem(item);
      openEvents();
      markActiveSession();
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function loadConfig() {
      const cfg = await (await fetch("/api/config")).json();
      presetsEl.innerHTML = "";
      for (const p of cfg.presetPrompts) {
        const b = document.createElement("button");
        b.textContent = p.label;
        b.onclick = () => { inputEl.value = p.prompt; inputEl.focus(); };
        presetsEl.appendChild(b);
      }
      metaEl.title = "Allowed tools: " + cfg.allowedTools.join(", ");
    }

    // ---- Settings modal ----
    const settingsModal = document.getElementById("settingsModal");
    async function openSettings() {
      const s = await (await fetch("/api/settings")).json();
      document.getElementById("setModel").value = s.model || "";
      document.getElementById("setKeyId").value = s.awsAccessKeyId || "";
      document.getElementById("setSecret").value = "";
      document.getElementById("setRegion").value = s.awsRegion || "";
      document.getElementById("secretHint").textContent = s.awsSecretAccessKeySet
        ? "保存済み。変更しない場合は空欄のままにしてください。"
        : "未設定です。";
      document.getElementById("savedMsg").textContent = "";
      settingsModal.classList.add("open");
    }
    function closeSettings() { settingsModal.classList.remove("open"); }
    async function saveSettings() {
      const body = {
        model: document.getElementById("setModel").value,
        awsAccessKeyId: document.getElementById("setKeyId").value,
        awsSecretAccessKey: document.getElementById("setSecret").value,
        awsRegion: document.getElementById("setRegion").value,
      };
      await fetch("/api/settings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      document.getElementById("savedMsg").textContent = "保存しました";
      await loadConfig();
      setTimeout(closeSettings, 700);
    }
    document.getElementById("settingsBtn").onclick = openSettings;
    document.getElementById("settingsCancel").onclick = closeSettings;
    document.getElementById("settingsSave").onclick = saveSettings;
    settingsModal.onclick = (e) => { if (e.target === settingsModal) closeSettings(); };

    document.getElementById("logoutBtn").onclick = async () => {
      await fetch("/api/logout", { method: "POST" });
      location.href = "/login.html";
    };

    async function send(prompt) {
      addMsg("user", prompt);
      sendEl.disabled = true;
      let assistantEl = null;
      let assistantText = "";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, prompt }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf("\n")) !== -1) {
            const line = buf.slice(0, nl).trim();
            buf = buf.slice(nl + 1);
            if (!line) continue;
            const ev = JSON.parse(line);
            if (ev.kind === "text") {
              if (!assistantEl) {
                assistantText = "";
                assistantEl = addAssistantMsg(() => assistantText);
              }
              assistantText += ev.text;
              renderMarkdown(assistantEl, assistantText);
              logEl.scrollTop = logEl.scrollHeight;
            } else if (ev.kind === "tool") {
              assistantEl = null; // After a tool, start text in a new bubble.
              addMsg("tool", "🔧 " + ev.name + "  " + JSON.stringify(ev.input));
            } else if (ev.kind === "tool_result") {
              addMsg("error", "↩ Tool result: " + ev.text);
            } else if (ev.kind === "error") {
              addMsg("error", "⚠ " + ev.message);
            } else if (ev.kind === "result") {
              const cost = ev.costUsd ? `  $${ev.costUsd.toFixed(4)}` : "";
              addMsg("result", `Done (${ev.durationMs}ms${cost})`);
            }
          }
        }
      } catch (e) {
        addMsg("error", "Communication error: " + e.message);
      } finally {
        sendEl.disabled = false;
        inputEl.focus();
        loadSessions(); // refresh history (title / order may have changed)
      }
    }

    document.getElementById("form").addEventListener("submit", (e) => {
      e.preventDefault();
      const prompt = inputEl.value.trim();
      if (!prompt) return;
      inputEl.value = "";
      send(prompt);
    });

    // Swapped: Shift+Enter sends, Enter inserts a new line.
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && e.shiftKey) {
        e.preventDefault();
        document.getElementById("form").requestSubmit();
      }
    });

    document.getElementById("newBtn").onclick = async () => {
      await newSession();
      await loadSessions();
    };

    (async () => {
      await loadConfig();
      await newSession();
      await loadSessions();
    })();
  </script>
</body>
</html>
