<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Chat — Sign in</title>
  <!-- Apollo fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet" />
  <!-- Apollo design system -->
  <link rel="stylesheet" href="/apollo-theme.css" />
  <link rel="stylesheet" href="/apollo-components.css" />
  <script>
    // Apply the saved theme before paint to avoid a flash.
    (function () {
      var t = localStorage.getItem("apollo-theme") || "light";
      document.documentElement.classList.add("apollo-design", t);
    })();
  </script>
  <style>
    body { height:100vh; display:flex; align-items:center; justify-content:center;
           background:var(--color-background-secondary); }
    .login-card { width:340px; max-width:90vw; position:relative; }
    .login-card h1 { font-size:24px; line-height:32px; font-weight:var(--font-weight-light);
                     margin:0 0 var(--spacing-micro); }
    .login-card p { font-size:13px; color:var(--color-foreground-de-emp); margin:0 0 var(--spacing-l); }
    .login-card .ap-btn[type=submit] { width:100%; margin-top:var(--spacing-base); }
    .err { color:var(--color-error); font-size:13px; margin-top:var(--spacing-s); min-height:18px; }
    .theme-toggle { position:absolute; top:var(--spacing-xs); right:var(--spacing-xs);
                    width:32px; height:32px; padding:0; font-size:16px; line-height:1; }
  </style>
</head>
<body>
  <form class="ap-card login-card" id="form">
    <button type="button" class="ap-btn ap-btn--tertiary theme-toggle" id="themeToggle" title="Toggle theme"></button>
    <h1>Claude Code Chat</h1>
    <p>Please sign in</p>
    <label class="ap-label" for="pw">Password</label>
    <input class="ap-input" id="pw" type="password" autocomplete="current-password" autofocus />
    <button class="ap-btn ap-btn--primary" type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script src="/theme.js"></script>
  <script>
    const form = document.getElementById("form");
    const pw = document.getElementById("pw");
    const err = document.getElementById("err");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = "";
      const r = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw.value }),
      });
      if (r.ok) {
        location.href = "/";
      } else {
        err.textContent = "Invalid password";
        pw.select();
      }
    });
  </script>
</body>
</html>
